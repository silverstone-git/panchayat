name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
      - name: Run Ruff Linter
        run: uv run ruff check .

  lint-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 21
      - name: Install Dependencies
        working-directory: ./client
        run: npm ci || npm install
      - name: Run ESLint
        working-directory: ./client
        run: npm run lint

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, threads, voting]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          enable-cache: true
      - name: Test ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          uv sync --dev
          uv run pytest tests/

  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Test Gateway
        working-directory: ./gateway
        run: ./mvnw clean test

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 21
      - name: Install Dependencies
        working-directory: ./client
        run: npm ci || npm install
      - name: Component Tests
        working-directory: ./client
        run: npm run test

  e2e:
    needs: [test-python, test-java, test-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Ecosystem
        run: docker compose -f docker-compose.dev.yml up -d
      - uses: actions/setup-node@v4
        with:
          node-version: 21
      - name: Install Playwright
        working-directory: ./client
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: ./client
        run: npm run test:e2e
