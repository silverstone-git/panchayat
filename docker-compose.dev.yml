services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile-debug
    container_name: demovox-gateway-dev
    ports:
      - "8080:8080"
      - "5005:5005" # Debug port if needed
    volumes:
      - ./gateway:/app
      - /app/target # Exclude container's target directory from host
      - ~/.m2:/root/.m2 # Cache maven dependencies
    env_file:
      - ./gateway/.env
    environment:
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres-db:5432/gateway_db
      - SPRING_DATA_REDIS_HOST=redis-cache
      - SPRING_THREADS_VIRTUAL_ENABLED=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - THREADS_SERVICE_URI=http://threads:8000
      - VOTING_SERVICE_URI=http://voting:8000
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - demovox-network

  threads:
    build:
      context: ./threads
      dockerfile: Dockerfile-debug
    container_name: demovox-threads-dev
    ports:
      - "8002:8000"
    volumes:
      - ./threads:/app
    env_file:
      - ./gateway/.env
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_DB=threads_db
      - REDIS_HOST=redis-cache
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - demovox-network

  voting:
    build:
      context: ./voting
      dockerfile: Dockerfile-debug
    container_name: demovox-voting-dev
    ports:
      - "8003:8000"
    volumes:
      - ./voting:/app
    env_file:
      - ./gateway/.env
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_DB=voting_db
      - REDIS_HOST=redis-cache
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - demovox-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile-debug
    container_name: demovox-client-dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules # Don't overwrite container node_modules with host
    environment:
      - GATEWAY_URL=http://demovox-gateway-dev:8080
      - THREADS_URL=http://demovox-threads-dev:8000
      - VOTING_URL=http://demovox-voting-dev:8000
    depends_on:
      - gateway
    networks:
      - demovox-network

  postgres-db:
    image: postgres:15
    container_name: postgres-db-dev
    env_file:
      - ./gateway/.env
    volumes:
      - ./postgres-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - demovox-network

  redis-cache:
    image: redis:latest
    container_name: redis-cache-dev
    ports:
      - "6379:6379"
    networks:
      - demovox-network

  elasticsearch:
    image: elasticsearch:9.3.3
    container_name: elasticsearch-dev
    env_file:
      - ./gateway/.env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"
      - cluster.routing.allocation.disk.threshold_enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9200:9200"
    networks:
      - demovox-network

  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka-dev
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - demovox-network

networks:
  demovox-network:
    driver: bridge

volumes:
  postgres_data:
