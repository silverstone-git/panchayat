services:
  gateway:
    build: ./gateway
    container_name: demovox-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./gateway/.env
    environment:
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres-db:5432/gateway_db
      - SPRING_DATA_REDIS_HOST=redis-cache
      - SPRING_THREADS_VIRTUAL_ENABLED=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - THREADS_SERVICE_URI=http://threads:8000
      - VOTING_SERVICE_URI=http://voting:8000
      - USER_SERVICE_URI=http://user-service:8000
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - demovox-network

  client:
    build: ./client
    container_name: demovox-client
    ports:
      - "5173:5173"
    environment:
      - GATEWAY_URL=http://gateway:8080
      - THREADS_URL=http://threads:8000
      - VOTING_URL=http://voting:8000
    depends_on:
      - gateway
    networks:
      - demovox-network

  threads:
    build: ./threads
    container_name: demovox-threads
    ports:
      - "8002:8000"
    env_file:
      - ./gateway/.env
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_DB=threads_db
      - REDIS_HOST=redis-cache
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - demovox-network

  voting:
    build: ./voting
    container_name: demovox-voting
    ports:
      - "8003:8000"
    env_file:
      - ./gateway/.env
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_DB=voting_db
      - REDIS_HOST=redis-cache
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - demovox-network

  user-service:
    build: ./user-service
    container_name: demovox-user-service
    ports:
      - "8001:8000"
    env_file:
      - ./gateway/.env
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_DB=users_db
      - REDIS_HOST=redis-cache
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - demovox-network

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    env_file:
      - ./gateway/.env
    volumes:
      - ./postgres-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - demovox-network

  redis-cache:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - demovox-network

  elasticsearch:
    image: elasticsearch:9.3.3
    container_name: elasticsearch
    env_file:
      - ./gateway/.env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"
      - cluster.routing.allocation.disk.threshold_enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9200:9200"
    networks:
      - demovox-network

  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - demovox-network

networks:
  demovox-network:
    driver: bridge

volumes:
  postgres_data:
