
services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile-debug
    volumes:
      - ./gateway:/app
      - /app/target
      - ~/.m2:/root/.m2
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URI=http://user-service:8000
      - THREADS_SERVICE_URI=http://threads:8000
      - VOTING_SERVICE_URI=http://voting:8000
      - MODERATION_SERVICE_URI=http://moderation-service:8000
      - EXPERT_REVIEW_SERVICE_URI=http://expert-review-service:8000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - demovox-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  threads:
    ports:
      - "8011-8012:8000"
    build:
      context: ./threads
      dockerfile: Dockerfile-debug
    volumes:
      - ./threads:/app
      - /app/.venv
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=threads_db
      - REDIS_HOST=redis-cache
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MODERATION_SERVICE_URL=http://moderation-service:8000
      - POPULAR_VOTE_THRESHOLD=1
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      replicas: 2
    networks:
      - demovox-network

  voting:
    ports:
      - "8021-8022:8000"
    build:
      context: ./voting
      dockerfile: Dockerfile-debug
    volumes:
      - ./voting:/app
      - /app/.venv
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=voting_db
      - REDIS_HOST=redis-cache
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      replicas: 2
    networks:
      - demovox-network

  user-service:
    ports:
      - "8001:8000"
    build:
      context: ./user-service
      dockerfile: Dockerfile-debug
    volumes:
      - ./user-service:/app
      - /app/.venv
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=users_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - demovox-network

  moderation-service:
    build:
      context: ./moderation-service
      dockerfile: Dockerfile-debug
    volumes:
      - ./moderation-service:/app
      - /app/.venv
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - demovox-network

  expert-review-service:
    build:
      context: ./expert-review-service
      dockerfile: Dockerfile-debug
    volumes:
      - ./expert-review-service:/app
      - /app/target
      - ~/.m2:/root/.m2
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=expert_review_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - demovox-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile-debug
    volumes:
      - ./notification-service:/app
      - /app/target
      - ~/.m2:/root/.m2
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=notification_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - demovox-network

  gov-submit-service:
    build:
      context: ./gov-submit-service
      dockerfile: Dockerfile-debug
    volumes:
      - ./gov-submit-service:/app
      - /app/target
      - ~/.m2:/root/.m2
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=gov_submit_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - demovox-network

  crowdfund-service:
    build:
      context: ./crowdfund-service
      dockerfile: Dockerfile-debug
    volumes:
      - ./crowdfund-service:/app
      - /app/target
      - ~/.m2:/root/.m2
    environment:
      - POSTGRES_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=crowdfund_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - demovox-network


  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14250:14250"
      - "4317:4317"
      - "4318:4317"
    networks:
      - demovox-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile-debug
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - GATEWAY_URL=http://gateway:8080
      - THREADS_URL=http://threads:8000
      - VOTING_URL=http://voting:8000
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    networks:
      - demovox-network

  # Monitoring (Accessible on localhost:3000 and localhost:9090)
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus-dev.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - demovox-network

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - demovox-network

  # Infrastructure (Keep these singletons for dev)
  postgres-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=panchayat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - demovox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gateway_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:alpine
    networks:
      - demovox-network

  elasticsearch:
    image: elasticsearch:8.11.3
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - cluster.routing.allocation.disk.threshold_enabled=false
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - demovox-network

  kafka:
    image: apache/kafka:4.1.2
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - demovox-network

networks:
  demovox-network:
    driver: bridge

volumes:
  postgres_data:
